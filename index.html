<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

  <title>Frontend Mentor | Social links profile</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <main id="card">
    <div class="img">
      <img src="./assets/images/avatar-jessica.jpeg" alt="image">
    </div>
    <div class="txt">Jessica Randall</div>
    <div class="text">London, United Kingdom</div>
    <div class="t">"Front-end developer and avid reader."</div>

    <div class="btn"><a class="txt" href="https://github.com/" target="_blank">GitHub</a></div>
    <div class="btn"><a class="txt" href="https://www.frontendmentor.io/" target="_blank">Frontend Mentor</a></div>
    <div class="btn"><a class="txt" href="https://www.linkedin.com" target="_blank">LinkedIn</a></div>
    <div class="btn"><a class="txt" href="https://twitter.com" target="_blank">Twitter</a></div>
    <div class="btn"><a class="txt" href="https://www.instagram.com" target="_blank">Instagram</a></div>
    <div class="btn"><a class="txt" href="https://cozyedit-pro.pages.dev/" target="_blank">CozyEdit Pro - Free Online Code Editor</a></div>
  </main>
</body>

</html>
